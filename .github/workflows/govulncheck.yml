name: govulncheck

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: 0 19 * * 5

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    name: Run govulncheck
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        id: govulncheck
        continue-on-error: true
        run: govulncheck -format json -scan module ./... > govulncheck_output.json

      - name: Update vulnerable non-stdlib dependencies
        if: steps.govulncheck.outcome == 'failure' && github.event_name != 'pull_request'
        id: update_deps
        run: |
          # Extract module paths from findings.
          # govulncheck sets module to "stdlib" for standard library vulnerabilities.
          VULNERABLE_MODULES=$(jq -r '
            select(.finding != null)
            | .finding.trace[0]
            | select(.module != null and .module != "" and .module != "stdlib")
            | .module
          ' govulncheck_output.json | sort -u)

          if [ -z "$VULNERABLE_MODULES" ]; then
            echo "Only stdlib vulnerabilities found — a Go version bump is needed. Skipping auto-PR."
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Non-stdlib vulnerable modules:"
          echo "$VULNERABLE_MODULES"

          while IFS= read -r module; do
            echo "Updating $module ..."
            go get "${module}@latest"
          done <<< "$VULNERABLE_MODULES"

          go mod tidy
          echo "has_updates=true" >> "$GITHUB_OUTPUT"
          echo "vulnerable_modules=$(echo "$VULNERABLE_MODULES" | tr '\n' ' ' | sed 's/ $//')" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.update_deps.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: update Go dependencies with known security vulnerabilities"
          title: "fix: update Go dependencies with known security vulnerabilities"
          body: |
            This PR was automatically created by the **govulncheck** workflow.

            One or more third-party Go module dependencies have known security vulnerabilities.
            The modules listed below were updated to their latest available version:

            ```
            ${{ steps.update_deps.outputs.vulnerable_modules }}
            ```

            Please review the dependency changes and merge when ready.
          branch: fix/vulnerable-dependencies
          delete-branch: true
          labels: security

      - name: Fail if vulnerabilities found
        if: steps.govulncheck.outcome == 'failure'
        run: |
          echo "govulncheck found vulnerabilities. See output above for details."
          exit 1
